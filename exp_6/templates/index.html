<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Study Planner</title>

    <!-- CSS -->
    <link rel="stylesheet" href="/static/style.css">

    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/your-kit-id.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="container">

    <header>
        <h1>📚 <span class="accent-text">Smart Study Planner</span></h1>
        <p>Organize your study like a pro 🚀</p>
    </header>

    <!-- FORM -->
    <div class="form-card">
        <h2 id="form-title">Add New Task</h2>

        <form id="task-form">
            <input type="hidden" id="task-id">

            <div class="input-group">
                <input type="text" id="subject" placeholder="Subject" required>
                <input type="date" id="date" required>
            </div>

            <input type="text" id="description" placeholder="Description" required>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary" id="submit-btn">
                    ➕ Add Task
                </button>

                <button type="button" class="btn btn-secondary hidden" id="cancel-btn">
                    Cancel
                </button>
            </div>
        </form>
    </div>

    <!-- TASK LIST -->
    <div id="task-list" class="task-grid"></div>

</div>

<!-- Toast -->
<div id="toast-container"></div>

<!-- JS -->
<script src="/static/app.js"></script>

</body>
</html>
