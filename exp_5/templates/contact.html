{% extends "base.html" %}
{% block content %}
<h2 class="page-title">Contact Support</h2>
    
{% if success %}
    <div class="success-message">
        <h3><i class="fa-solid fa-circle-check"></i> Thank you, {{ name }}!</h3>
        <p>Your message has been received. We will get back to you soon.</p>
        <br>
        <a href="{{ url_for('contact') }}" class="btn btn-primary">Send Another Message</a>
    </div>
{% else %}
    <form action="{{ url_for('contact') }}" method="POST" class="contact-form">
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required placeholder="Enter your name">
        </div>
        
        <div class="form-group">
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required placeholder="How can we help?"></textarea>
        </div>
        
        <button type="submit" class="btn btn-primary">Send Message</button>
    </form>
{% endif %}
{% endblock %}
